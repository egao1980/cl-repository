name: Test

on:
  push:
    branches: [main]
  pull_request:

env:
  SBCL_VERSION: 2.4.11

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        system:
          - cl-oci
          - cl-oci-client
          - cl-repository-packager
          - cl-repository-client
          - cl-repository-ql-exporter

    steps:
      - uses: actions/checkout@v4

      - name: Install Roswell
        run: |
          curl -sL https://raw.githubusercontent.com/roswell/roswell/master/scripts/install-for-ci.sh | bash
          echo "$HOME/.roswell/bin" >> "$GITHUB_PATH"

      - name: Install SBCL
        run: |
          ros install "sbcl-bin/$SBCL_VERSION"
          ros use "sbcl-bin/$SBCL_VERSION"

      - name: Install dependencies
        run: |
          ros install qlot
          qlot install

      - name: Test ${{ matrix.system }}
        run: |
          qlot exec ros -e '(asdf:test-system "${{ matrix.system }}")'

  integration:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5050:5000

    steps:
      - uses: actions/checkout@v4

      - name: Install Roswell
        run: |
          curl -sL https://raw.githubusercontent.com/roswell/roswell/master/scripts/install-for-ci.sh | bash
          echo "$HOME/.roswell/bin" >> "$GITHUB_PATH"

      - name: Install SBCL
        run: |
          ros install "sbcl-bin/$SBCL_VERSION"
          ros use "sbcl-bin/$SBCL_VERSION"

      - name: Install dependencies
        run: |
          ros install qlot
          qlot install

      - name: Run integration tests
        run: |
          qlot exec ros -e '(asdf:test-system "cl-repository-integration-tests")'
