name: Publish to GHCR

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}/cl-systems
  SBCL_VERSION: 2.4.11

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Roswell
        run: |
          curl -sL https://raw.githubusercontent.com/roswell/roswell/master/scripts/install-for-ci.sh | bash
          echo "$HOME/.roswell/bin" >> "$GITHUB_PATH"

      - name: Install SBCL
        run: |
          ros install "sbcl-bin/$SBCL_VERSION"
          ros use "sbcl-bin/$SBCL_VERSION"

      - name: Install dependencies
        run: |
          ros install qlot
          qlot install

      - name: Build and publish all systems
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAMESPACE=$(echo "${{ env.NAMESPACE }}" | tr '[:upper:]' '[:lower:]')

          SYSTEMS=("cl-oci" "cl-oci-client" "cl-repository-packager" "cl-repository-client" "cl-repository-ql-exporter")

          for SYSTEM in "${SYSTEMS[@]}"; do
            echo "::group::Publishing ${SYSTEM}:${VERSION}"
            qlot exec ros -e "
              (asdf:load-system \"cl-repository-packager\")
              (let* ((auth (cl-oci-client/auth:make-auth-config
                             :username \"${{ github.actor }}\"
                             :password (uiop:getenv \"GITHUB_TOKEN\")))
                     (reg (cl-oci-client/registry:make-registry
                            \"https://${REGISTRY}\" :auth auth))
                     (spec (cl-repository-packager/asdf-plugin:auto-package-spec \"${SYSTEM}\"))
                     (result (cl-repository-packager/build-matrix:build-package spec)))
                (cl-repository-packager/publisher:publish-package
                  reg
                  \"${NAMESPACE}/${SYSTEM}\"
                  \"${VERSION}\"
                  result))
            "
            echo "::endgroup::"
          done

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Verify published artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAMESPACE=$(echo "${{ env.NAMESPACE }}" | tr '[:upper:]' '[:lower:]')

          SYSTEMS=("cl-oci" "cl-oci-client" "cl-repository-packager" "cl-repository-client" "cl-repository-ql-exporter")

          for SYSTEM in "${SYSTEMS[@]}"; do
            REF="${{ env.REGISTRY }}/${NAMESPACE}/${SYSTEM}:${VERSION}"
            echo "Verifying ${REF}"
            oras manifest fetch "${REF}" --registry-config <(echo '{"auths":{"ghcr.io":{"username":"${{ github.actor }}","password":"${{ secrets.GITHUB_TOKEN }}"}}}')
          done
